<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h1 class="text-center mb-4">
                سلام پوریا 👋
            </h1>

            <div class="text-center mb-4">
                <a href="{% url 'add_task' %}" class="btn btn-success">
                    ➕ اضافه کردن Task جدید
                </a>
            </div>

            <h3 class="mb-3">لیست کارها</h3>

            {% for task in tasks %}
                <div class="card mb-2">
                    <div class="card-body d-flex justify-content-between align-items-center">

                        <span>
                            {% if task.completed %}
                                <s>✅ {{ task.title }}</s>
                            {% else %}
                                {{ task.title }}
                            {% endif %}
                        </span>

                        <div>
                            <a href="{% url 'toggle_complete' task.id %}" class="btn btn-success btn-sm">
                                ✅ انجام شد
                            </a>

                            <a href="{% url 'edit_task' task.id %}" class="btn btn-warning btn-sm">
                                ✏️ ویرایش
                            </a>

                            <a href="{% url 'delete_task' task.id %}" class="btn btn-danger btn-sm">
                                ❌ حذف
                            </a>
                        </div>

                    </div>
                </div>

            {% empty %}
                <div class="alert alert-info">
                    هیچ کاری ثبت نشده است.
                </div>
            {% endfor %}

        </div>
    </div>

</div>

</body>
</html>
