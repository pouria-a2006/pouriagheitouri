<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

<h1>سلام پوریا 👋</h1>
<p>
    <a href="{% url 'add_task' %}">➕ اضافه کردن Task جدید</a>
</p>
<h2>لیست کارها</h2>

{% for task in tasks %}
    <p>
        ✔ {{ task.title }}
        <a href="{% url 'delete_task' task.id %}">❌ حذف</a>
    </p>
{% empty %}
    <p>هیچ کاری نیست</p>
{% endfor %}

</body>
</html>
