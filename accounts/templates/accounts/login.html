<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 45px 40px;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .login-icon i {
            font-size: 32px;
            color: white;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
        }
        .btn-login:hover {
            opacity: 0.9;
            color: white;
        }
        .demo-box {
            background: #f0f4ff;
            border: 1px dashed #764ba2;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="login-icon">
        <i class="bi bi-check2-square"></i>
    </div>

    <h3 class="text-center fw-bold mb-1">Welcome Back</h3>
    <p class="text-center text-muted mb-4">Sign in to manage your tasks</p>

    {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label small fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
    </form>

    <p class="text-center text-muted mt-4 mb-0" style="font-size: 14px;">
        Don't have an account? <a href="/accounts/register/" class="fw-semibold text-decoration-none">Sign up</a>
    </p>

    <div class="demo-box">
        <strong>👀 مشاهده نمونه‌کار؟</strong><br>
        برای تست سریع از حساب دمو استفاده کنید:<br>
        نام کاربری: <code>demo</code> &nbsp;|&nbsp; رمز عبور: <code>demo12345</code>
    </div>

    <p class="text-center text-muted mt-3 mb-0" style="font-size: 12px;">
        Built by Pouria &middot;
        <a href="https://github.com/pouria-a2006" target="_blank" class="text-decoration-none">
            <i class="bi bi-github"></i> GitHub
        </a>
    </p>

</div>

</body>
</html>
